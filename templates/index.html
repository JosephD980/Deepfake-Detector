<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deepfake Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a23;
      --border:    #2a2f3d;
      --accent:    #5b8dee;
      --real:      #34c97e;
      --tampered:  #f5a623;
      --fake:      #e84040;
      --text:      #e2e8f0;
      --muted:     #6b7280;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header { text-align: center; margin-bottom: 36px; }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 860px;
    }

    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone:hover, #drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(91,141,238,0.05);
    }
    #drop-zone svg { opacity: 0.4; margin-bottom: 14px; }
    #drop-zone p  { color: var(--muted); font-size: 0.9rem; }
    #drop-zone strong { color: var(--accent); }
    #file-input { display: none; }

    #analyse-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #analyse-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #analyse-btn:not(:disabled):hover { opacity: 0.88; }

    #spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 32px 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .spin {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #results { display: none; margin-top: 32px; }

    .verdict {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .verdict-badge { font-size: 2rem; line-height: 1; }
    .verdict-text h2 { font-size: 1.5rem; font-weight: 700; }
    .verdict-text p { color: var(--muted); font-size: 0.9rem; margin-top: 2px; }
    .verdict.real     { background: rgba(52,201,126,0.08); border-color: rgba(52,201,126,0.35); }
    .verdict.tampered { background: rgba(245,166,35,0.08);  border-color: rgba(245,166,35,0.35); }
    .verdict.fake     { background: rgba(232,64,64,0.08);   border-color: rgba(232,64,64,0.35); }
    .verdict.real     .verdict-text h2 { color: var(--real); }
    .verdict.tampered .verdict-text h2 { color: var(--tampered); }
    .verdict.fake     .verdict-text h2 { color: var(--fake); }

    .probs { margin-bottom: 28px; }
    .probs h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px; }
    .prob-row { margin-bottom: 12px; }
    .prob-label { display: flex; justify-content: space-between; font-size: 0.88rem; margin-bottom: 5px; }
    .prob-label span:last-child { color: var(--muted); }
    .bar-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
    .bar-fill.real     { background: var(--real); }
    .bar-fill.tampered { background: var(--tampered); }
    .bar-fill.fake     { background: var(--fake); }

    .image-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 560px) { .image-pair { grid-template-columns: 1fr; } }

    .img-card { text-align: center; }
    .img-card p {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .img-card img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: block;
    }
